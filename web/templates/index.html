<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>控制點查詢系統</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1f28;--panel:#162d38;--panel2:#1c3a47;--line:#27506322;
  --ink:#deeef4;--dim:#7da8b8;--cyan:#28c5d6;--amber:#f5a623;--red:#ef5350;--green:#3ddc97;
  --side-w:290px;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
#app{display:flex;height:100%}

/* ── 側欄收合 ── */
#side{
  width:var(--side-w);background:var(--panel);display:flex;flex-direction:column;
  border-right:1px solid #0a151c;z-index:1000;box-shadow:2px 0 14px #0008;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
  position:relative;flex-shrink:0;
}
#side.collapsed{transform:translateX(calc(-1 * var(--side-w)));margin-right:calc(-1 * var(--side-w))}

/* 收合按鈕 */
#toggleBtn{
  position:absolute;top:50%;right:-15px;transform:translateY(-50%);
  width:15px;height:48px;background:var(--panel);border:1px solid #1e4a5c;
  border-left:none;border-radius:0 8px 8px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:1001;
  color:var(--dim);font-size:10px;transition:.22s;
}
#toggleBtn:hover{background:var(--panel2);color:var(--cyan)}
#side.collapsed #toggleBtn{right:-15px}

#logo{padding:14px 16px 10px;border-bottom:1px solid #0a151c}
#logo h1{font-size:15px;font-weight:700;line-height:1.3}
#logo .sub{font:11px 'IBM Plex Mono',monospace;color:var(--cyan);margin-top:3px}
.sec{padding:10px 14px;border-bottom:1px solid #0a151c}
.sec h2{font-size:10px;letter-spacing:.2em;color:var(--dim);font-weight:600;margin-bottom:8px}
#search{display:flex;gap:6px}
#search input{flex:1;background:var(--panel2);border:1px solid #2b5365;color:var(--ink);
  padding:6px 9px;border-radius:6px;font:13px 'IBM Plex Mono',monospace;outline:none}
#search input:focus{border-color:var(--cyan)}
.btn{background:var(--panel2);border:1px solid #2b5365;color:var(--ink);padding:6px 10px;
  border-radius:6px;cursor:pointer;font-size:12.5px;font-family:inherit;transition:.15s}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.basemaps{display:flex;gap:5px}
.basemaps .btn{flex:1;padding:5px 3px;font-size:11.5px;text-align:center}
.basemaps .btn.on{border-color:var(--cyan);color:var(--cyan);background:#28c5d612}

/* 圖層清單 */
.llist{flex:1;overflow-y:auto;padding:4px 0}
.lsection{padding:5px 14px 2px;font-size:10px;letter-spacing:.18em;color:var(--dim);font-weight:600}
.lrow{display:flex;align-items:center;gap:7px;padding:5px 14px;font-size:12.5px;cursor:default;
  border-bottom:1px solid var(--line)}
.lrow:hover{background:#ffffff07}
.lrow input[type=checkbox]{accent-color:var(--cyan);width:13px;height:13px;cursor:pointer}
.ldot{width:11px;height:11px;border-radius:50%;flex:none;border:1.5px solid #10333c}
.lrow .lname{flex:1;font-size:12px}
.lrow .lcnt{font:11px 'IBM Plex Mono',monospace;color:var(--dim)}
.lrow select{background:var(--panel2);color:var(--dim);border:1px solid #2b5365;
  border-radius:4px;font-size:10.5px;padding:1px 2px;cursor:pointer}
.lrow.dimmed{opacity:.4}
.lrow .ztag{font-size:10px;color:var(--dim)}

/* 底部 */
#side footer{padding:8px 14px;border-top:1px solid #0a151c}
.syncbar{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--dim)}
.syncbar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex:none;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.syncbar .time{flex:1;font-family:'IBM Plex Mono',monospace;font-size:10.5px}
.syncbar .btn{padding:4px 8px;font-size:11px}

/* ── 地圖 ── */
#mapwrap{flex:1;position:relative;min-width:0}
#map{position:absolute;inset:0}
#statusbar{position:absolute;left:0;right:0;bottom:0;height:24px;z-index:900;
  background:#0f1f28cc;backdrop-filter:blur(4px);display:flex;align-items:center;gap:16px;
  padding:0 12px;font:11px 'IBM Plex Mono',monospace;color:var(--dim)}
#statusbar b{color:var(--cyan);font-weight:500}
#bmbar{position:absolute;top:10px;right:10px;z-index:900;display:flex;gap:6px}
#bmbar .btn{background:#162d38e8;box-shadow:0 2px 8px #0007}

/* ── 資訊面板 ── */
#info{
  position:absolute;top:0;right:-380px;width:370px;bottom:24px;z-index:950;
  background:#162d38f4;backdrop-filter:blur(8px);border-left:1px solid #0a151c;
  transition:right .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;
}
#info.open{right:0}
#info .ihead{
  display:flex;align-items:flex-start;padding:14px 14px 10px;
  border-bottom:1px solid #0a151c;gap:10px;
}
#info .ihead .pt{font:700 18px 'IBM Plex Mono',monospace;color:var(--amber);flex:1;line-height:1.2}
#info .ihead .sys{
  font-size:10px;background:#f5a62322;color:var(--amber);padding:2px 8px;
  border-radius:10px;margin-top:3px;display:inline-block;letter-spacing:.05em;
}
#info .ihead .x{
  cursor:pointer;color:var(--dim);font-size:18px;padding:2px 5px;margin-top:-2px;
  border-radius:4px;transition:.15s;
}
#info .ihead .x:hover{background:#ffffff14;color:var(--ink)}
#info .ibody{flex:1;overflow-y:auto;padding:10px 14px}
.frow{display:flex;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px;gap:8px}
.frow .k{width:72px;color:var(--dim);flex:none;font-size:12px;padding-top:1px}
.frow .v{flex:1;font-family:'IBM Plex Mono',monospace;font-size:12px;word-break:break-all;line-height:1.5}
.null{color:#3d5f6e;font-style:italic}

/* ── 照片區 ── */
.photo-section{margin:12px 0 6px}
.photo-label{font-size:11px;letter-spacing:.15em;color:var(--dim);font-weight:600;margin-bottom:8px}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-item{position:relative;border-radius:8px;overflow:hidden;background:#0a151c;
  border:1px solid #2b5365;cursor:pointer;transition:.2s}
.photo-item:hover{border-color:var(--amber);transform:scale(1.02)}
.photo-item img{width:100%;height:110px;object-fit:cover;display:block}
.photo-item .ph-no{
  position:absolute;bottom:0;left:0;right:0;padding:4px 7px;
  background:linear-gradient(transparent,#0a151ccc);
  font:500 10px 'IBM Plex Mono',monospace;color:#cde8f0;
}
.no-photo{
  padding:16px;text-align:center;font-size:12px;color:var(--dim);
  background:#0a151c44;border-radius:8px;border:1px dashed #2b5365;
}

/* 燈箱 */
#lightbox{
  display:none;position:fixed;inset:0;background:#000c;z-index:3000;
  align-items:center;justify-content:center;
}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 8px 40px #000a}
#lightbox .lb-x{
  position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer;
  line-height:1;opacity:.8;transition:.15s;
}
#lightbox .lb-x:hover{opacity:1}
#lightbox .lb-info{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font:12px 'IBM Plex Mono',monospace;color:#cde8f0;background:#0a151ccc;
  padding:5px 14px;border-radius:16px;
}

.ilayer{font-size:11px;color:var(--dim);margin-top:12px;padding-top:8px;border-top:1px solid var(--line)}

/* toast */
#toast{position:fixed;bottom:38px;left:50%;transform:translateX(-50%);z-index:2000;
  background:#0a2730;border:1px solid var(--cyan);color:var(--cyan);padding:7px 16px;
  border-radius:18px;font-size:12.5px;opacity:0;transition:.22s;pointer-events:none;max-width:85%}
#toast.show{opacity:1}
.pttip{font:600 10.5px 'IBM Plex Mono',monospace;background:#0f1f28cc;color:#ffe2ae;
  border:1px solid #f5a62355;border-radius:4px;padding:1px 5px}
.pttip::before{display:none}
.leaflet-container{font-family:'Noto Sans TC'}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ 左側欄 ═══ -->
  <aside id="side">
    <!-- 收合按鈕 -->
    <div id="toggleBtn" onclick="toggleSide()" title="收合/展開側欄">◀</div>

    <div id="logo">
      <h1>控制點查詢系統</h1>
      <div class="sub">CONTROL POINT VIEWER · QGIS SYNC</div>
    </div>

    <div class="sec">
      <h2>搜尋點號</h2>
      <div id="search">
        <input id="q" placeholder="點號 例:K01、AN01016" spellcheck="false"
               onkeydown="if(event.key==='Enter')searchPt()">
        <button class="btn" onclick="searchPt()">定位</button>
      </div>
    </div>

    <div class="sec">
      <h2>底圖</h2>
      <div class="basemaps">
        <button class="btn on" data-bm="emap"  onclick="setBase('emap')">通用電子</button>
        <button class="btn"    data-bm="photo" onclick="setBase('photo')">正射影像</button>
        <button class="btn"    data-bm="osm"   onclick="setBase('osm')">OSM</button>
      </div>
    </div>

    <div class="sec" style="padding-bottom:2px">
      <h2>圖層 &amp; 樁類 <span style="font-weight:400;color:var(--dim)">(z≥ 可調)</span></h2>
    </div>
    <div class="llist" id="llist"></div>

    <footer>
      <div class="syncbar">
        <span class="dot" id="syncDot" style="background:var(--dim)"></span>
        <span class="time" id="syncTime">載入中…</span>
        <button class="btn" onclick="checkMeta(true)">↻</button>
      </div>
    </footer>
  </aside>

  <!-- ═══ 地圖 ═══ -->
  <div id="mapwrap">
    <div id="map"></div>
    <div id="bmbar">
      <button class="btn" data-bm="emap"  onclick="setBase('emap')">電子地圖</button>
      <button class="btn" data-bm="photo" onclick="setBase('photo')">正射影像</button>
    </div>

    <!-- 資訊面板 -->
    <div id="info">
      <div class="ihead">
        <div style="flex:1">
          <div class="pt" id="iPt">—</div>
          <span class="sys" id="iSys"></span>
        </div>
        <span class="x" onclick="closeInfo()">✕</span>
      </div>
      <div class="ibody" id="iBody"></div>
    </div>

    <div id="statusbar">
      <span>縮放 <b id="stZ">—</b></span>
      <span>顯示 <b id="stS">0</b> / <b id="stT">0</b></span>
      <span id="stXY"></span>
    </div>
  </div>
</div>

<!-- 照片燈箱 -->
<div id="lightbox" onclick="closeLb()">
  <span class="lb-x" onclick="closeLb()">✕</span>
  <img id="lbImg" src="" alt="">
  <div class="lb-info" id="lbInfo"></div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ═══ 側欄收合 ═══ */
let sideOpen = true;
function toggleSide(){
  sideOpen = !sideOpen;
  const side = document.getElementById('side');
  const btn  = document.getElementById('toggleBtn');
  side.classList.toggle('collapsed', !sideOpen);
  btn.textContent = sideOpen ? '◀' : '▶';
  setTimeout(()=>map.invalidateSize(), 240);
}

/* ═══ 圖層設定 ═══ */
const LAYER_CFG = {
  "67圖根(全)": {color:"#28c5d6", minZ:13, on:true,  group:"67系統(TWD67)"},
  "67補點":     {color:"#ffe066", minZ:14, on:true,  group:"67系統(TWD67)"},
  "都發局67圖根":{color:"#9b7cff",minZ:15, on:false, group:"67系統(TWD67)"},
  "97圖根":     {color:"#f5a623", minZ:13, on:true,  group:"97系統(TWD97)"},
  "安定區97":   {color:"#3ddc97", minZ:14, on:true,  group:"97系統(TWD97)"},
};
const TYPE_COLOR = {
  "鋼釘":"#28c5d6","道釘":"#3ddc97","鋼標":"#f5a623","水泥樁":"#b07ef7",
  "標註點":"#9db8c2","待確認":"#ffe066","滅失":"#ef5350","":""
};
const TYPE_MINZ = {"鋼標":11,"水泥樁":11,"鋼釘":15,"道釘":16,"標註點":16,"待確認":16,"滅失":17,"":15};
const TYPE_VISIBLE = {};
Object.keys(TYPE_COLOR).forEach(t=>{ TYPE_VISIBLE[t]={on:t!=="滅失",minZ:TYPE_MINZ[t]||15}; });

/* ═══ 地圖 ═══ */
const map = L.map("map",{zoomControl:true,preferCanvas:true}).setView([23.07,120.20],13);
const BASES = {
  emap : L.tileLayer("https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}",
          {maxZoom:20,attribution:"© 內政部國土測繪中心"}),
  photo: L.tileLayer("https://wmts.nlsc.gov.tw/wmts/PHOTO2/default/GoogleMapsCompatible/{z}/{y}/{x}",
          {maxZoom:20,attribution:"© 內政部國土測繪中心"}),
  osm  : L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",
          {maxZoom:19,attribution:"© OpenStreetMap"}),
};
BASES.emap.addTo(map);
function setBase(k){
  Object.values(BASES).forEach(l=>map.removeLayer(l)); BASES[k].addTo(map);
  document.querySelectorAll("[data-bm]").forEach(b=>b.classList.toggle("on",b.dataset.bm===k));
}

/* ═══ 資料與渲染 ═══ */
let POINTS=[], MARKERS={}, fitted=false;
const grp = L.layerGroup().addTo(map);

function typeColor(p){
  const lcfg = LAYER_CFG[p["圖層"]];
  return TYPE_COLOR[p.TYPE] || (lcfg ? lcfg.color : "#ccc");
}
function isVisible(p){
  const lc = LAYER_CFG[p["圖層"]]; if(!lc||!lc.on) return false;
  const tc = TYPE_VISIBLE[p.TYPE]||TYPE_VISIBLE[""];   if(!tc.on) return false;
  return map.getZoom() >= Math.max(lc.minZ, tc.minZ);
}
function refresh(){
  const b=map.getBounds().pad(0.25); grp.clearLayers(); MARKERS={}; let shown=0;
  for(const p of POINTS){
    if(!isVisible(p)||!b.contains([p.lat,p.lng])) continue;
    const c=typeColor(p), lost=p.TYPE==="滅失";
    const m=L.circleMarker([p.lat,p.lng],{
      radius:5.5,weight:lost?2.2:1.5,
      color:lost?c:"#0a1e28",fillColor:c,fillOpacity:lost?0:0.92
    });
    m.bindTooltip(p.NO,{direction:"top",offset:[0,-7],className:"pttip"});
    m.on("click",()=>openInfo(p.id));
    grp.addLayer(m); MARKERS[p.id]=m; shown++;
  }
  document.getElementById("stZ").textContent=map.getZoom();
  document.getElementById("stS").textContent=shown;
  document.getElementById("stT").textContent=POINTS.length;
  renderLayerList();
}
map.on("zoomend moveend",refresh);
map.on("mousemove",e=>document.getElementById("stXY").textContent=
  `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`);

async function load(){
  POINTS=await(await fetch("/api/points")).json();
  if(!fitted&&POINTS.length){
    fitted=true;
    const la=POINTS.map(p=>p.lat),ln=POINTS.map(p=>p.lng);
    map.fitBounds([[Math.min(...la),Math.min(...ln)],[Math.max(...la),Math.max(...ln)]],{padding:[28,28]});
  }
  refresh();
}

/* ═══ 圖層清單 ═══ */
function renderLayerList(){
  const z=map.getZoom(),el=document.getElementById("llist");
  const cnt={};
  POINTS.forEach(p=>{ const k=p["圖層"]+"|"+p.TYPE; cnt[k]=(cnt[k]||0)+1; });
  const groups={};
  Object.entries(LAYER_CFG).forEach(([n,c])=>{ if(!groups[c.group]) groups[c.group]=[]; groups[c.group].push([n,c]); });
  let html="";
  for(const [gn,layers] of Object.entries(groups)){
    html+=`<div class="lsection">${gn}</div>`;
    for(const [ln,lc] of layers){
      const lCnt=POINTS.filter(p=>p["圖層"]===ln).length;
      const act=lc.on&&z>=lc.minZ;
      html+=`<div class="lrow${act?"":lc.on?" dimmed":""}">
        <input type="checkbox" ${lc.on?"checked":""} onchange="toggleLayer('${ln}',this.checked)">
        <span class="ldot" style="background:${lc.color}"></span>
        <span class="lname" style="font-weight:600">${ln}</span>
        <span class="lcnt">${lCnt}</span>
        <span class="ztag">z≥</span>
        <select onchange="setLayerZ('${ln}',+this.value)">
          ${[11,12,13,14,15,16].map(v=>`<option ${v===lc.minZ?"selected":""}>${v}</option>`).join("")}
        </select></div>`;
      for(const [tn,tc] of Object.entries(TYPE_VISIBLE)){
        if(!tn) continue;
        const c2=cnt[ln+"|"+tn]; if(!c2) continue;
        const lost=tn==="滅失";
        const tAct=lc.on&&tc.on&&z>=Math.max(lc.minZ,tc.minZ);
        const dot=lost
          ? `<svg width="11" height="11" viewBox="0 0 11 11"><line x1="1" y1="1" x2="10" y2="10" stroke="${TYPE_COLOR["滅失"]}" stroke-width="2"/><line x1="10" y1="1" x2="1" y2="10" stroke="${TYPE_COLOR["滅失"]}" stroke-width="2"/></svg>`
          : `<span class="ldot" style="background:${TYPE_COLOR[tn]||lc.color};width:9px;height:9px"></span>`;
        html+=`<div class="lrow${tAct?"":lc.on&&tc.on?" dimmed":""}" style="padding-left:26px">
          <input type="checkbox" ${tc.on?"checked":""} onchange="toggleType('${tn}',this.checked)">
          ${dot}
          <span class="lname" style="color:var(--dim)">${tn}</span>
          <span class="lcnt">${c2}</span>
          <span class="ztag">z≥</span>
          <select onchange="setTypeZ('${tn}',+this.value)">
            ${[11,12,13,14,15,16,17].map(v=>`<option ${v===tc.minZ?"selected":""}>${v}</option>`).join("")}
          </select></div>`;
      }
    }
  }
  el.innerHTML=html;
}
function toggleLayer(n,v){LAYER_CFG[n].on=v;refresh();}
function setLayerZ(n,v){LAYER_CFG[n].minZ=v;refresh();}
function toggleType(n,v){if(TYPE_VISIBLE[n])TYPE_VISIBLE[n].on=v;refresh();}
function setTypeZ(n,v){if(TYPE_VISIBLE[n])TYPE_VISIBLE[n].minZ=v;refresh();}

/* ═══ 資訊面板 + 照片 ═══ */
let CUR=null;
function openInfo(id){
  CUR=POINTS.find(p=>p.id===id); if(!CUR) return;
  const p=CUR;
  document.getElementById("iPt").textContent=p.NO||"—";
  document.getElementById("iSys").textContent=p["系統"]+" · "+p["圖層"];

  const nul=()=>`<span class="null">—</span>`;
  const val=v=>(v!=null&&v!=="") ? String(v).replace(/</g,"&lt;") : null;
  const rows=[
    ["樁類", p.TYPE],
    ["日期", p.DATE],
    [p["系統"]==="TWD67"?"X_67":"X_97", p.X],
    [p["系統"]==="TWD67"?"Y_67":"Y_97", p.Y],
    ["WGS84", (p.lat&&p.lng)?`${p.lat}, ${p.lng}`:null],
    ["備註",  p.PS],
    ["轉換",  p.TRANS_TYPE],
  ];
  let body=rows.map(([k,v])=>`
    <div class="frow">
      <span class="k">${k}</span>
      <span class="v">${val(v)??nul()}</span>
    </div>`).join("");

  /* 照片區塊 */
  body += `<div class="photo-section"><div class="photo-label">現場照片</div>`;
  if(p.imgs && p.imgs.length){
    body += `<div class="photo-grid">`;
    p.imgs.forEach((u,i)=>{
      body += `<div class="photo-item" onclick="openLb('${u}','${p.NO} — 照片${i+1}')">
        <img src="${u}" loading="lazy"
             onerror="this.closest('.photo-item').style.display='none'"
             alt="照片${i+1}">
        <div class="ph-no">照片 ${i+1}</div>
      </div>`;
    });
    body += `</div>`;
  } else {
    body += `<div class="no-photo">此點位無現場照片紀錄</div>`;
  }
  body += `</div>`;

  body += `<div class="ilayer">圖層：${p["圖層"]} &nbsp;|&nbsp; ID：${p.id}</div>`;

  document.getElementById("iBody").innerHTML=body;
  document.getElementById("info").classList.add("open");
  if(MARKERS[id]) MARKERS[id].setStyle({radius:9,weight:3,color:"#fff"});
}
function closeInfo(){
  document.getElementById("info").classList.remove("open");
  refresh(); CUR=null;
}

/* ═══ 燈箱 ═══ */
function openLb(url, caption){
  document.getElementById("lbImg").src=url;
  document.getElementById("lbInfo").textContent=caption;
  document.getElementById("lightbox").classList.add("open");
}
function closeLb(){
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lbImg").src="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeLb();});

/* ═══ 搜尋 ═══ */
function searchPt(){
  const q=document.getElementById("q").value.trim().toUpperCase(); if(!q) return;
  const p=POINTS.find(p=>String(p.NO).toUpperCase()===q)
       ||POINTS.find(p=>String(p.NO).toUpperCase().includes(q));
  if(!p){toast("查無點號「"+q+"」");return;}
  map.setView([p.lat,p.lng],Math.max(map.getZoom(),18));
  setTimeout(()=>openInfo(p.id),200);
}

/* ═══ QGIS 同步 ═══ */
let STAMP=0;
async function checkMeta(manual=false){
  try{
    const m=await(await fetch("/api/meta")).json();
    const dot=document.getElementById("syncDot");
    document.getElementById("syncTime").textContent=m.ts||"—";
    if(m.err){dot.style.background="var(--red)";toast("資料來源錯誤:"+m.err);return;}
    dot.style.background="var(--green)";
    if(m.stamp!==STAMP){
      const first=STAMP===0;STAMP=m.stamp;
      await load();
      if(!first) toast(`QGIS 資料已更新,重載 ${m.total} 點`);
      else if(manual) toast(`最新資料:共 ${m.total} 點`);
    } else if(manual) toast(`已是最新 (${m.total} 點)`);
  }catch(e){document.getElementById("syncDot").style.background="var(--dim)";
    if(manual) toast("無法連線伺服器");}
}
checkMeta();
setInterval(checkMeta,30000);

/* ═══ 工具 ═══ */
let tt;
function toast(t){
  const el=document.getElementById("toast");el.textContent=t;
  el.classList.add("show");clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove("show"),2500);
}
</script>
